name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fish-syntax:
    name: Fish syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Fish
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-4
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check Fish syntax
        run: |
          fail=0
          while IFS= read -r f; do
            if ! fish -n "$f" 2>&1; then
              fail=1
            fi
          done < <(find fish -name '*.fish' -type f)
          exit $fail

  lua-format:
    name: Lua format check (StyLua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check nvim/

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -d relaxed install.conf.yaml

  dotbot-install:
    name: Dotbot install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run dotbot install
        run: ./install
