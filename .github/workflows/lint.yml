name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fish-syntax:
    name: Fish syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Fish
        run: |
          sudo apt-add-repository -y ppa:fish-shell/release-4
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check Fish syntax
        run: |
          fail=0
          while IFS= read -r f; do
            if ! fish -n "$f" 2>&1; then
              fail=1
            fi
          done < <(find fish -name '*.fish' -type f)
          exit $fail

  lua-format:
    name: Lua format check (StyLua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install StyLua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Check Lua format
        run: stylua --check nvim/

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML
        run: yamllint -d relaxed install.conf.yaml

  dotbot-install:
    name: Dotbot install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run dotbot install
        run: ./install
