[mgr]
sort_by = "mtime"
sort_reverse = true
show_hidden = true
linemode = "size_and_mtime"

[preview]
max_width = 1000
max_height = 2000

[opener]
edit = [{ run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" }]
open = [{ run = 'wslview "$@"', desc = "open", orphan = true, for = "linux" }]

[open]
prepend_rules = [
  { name = "*.pdf", use = "open" },
  { name = "*.tex", use = "edit" },
  { name = "*.svg", use = "open" },
  { mime = "image/*", use = "open" },
]
