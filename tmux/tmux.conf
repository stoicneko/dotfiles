# Entry point for tmux configuration. Everything else lives in ~/.tmux/conf.d.
# Drop additional *.tmux files into that directory to extend the setup.
#
# Based on theniceboy's config, adapted for QWERTY layout.
# Original: https://github.com/theniceboy/.config/blob/master/.tmux.conf

set -g @dotfiles_tmux_dir "$HOME/.tmux"
set -g @dotfiles_tmux_conf "$HOME/.tmux/conf.d"

source-file -q "$HOME/.tmux/conf.d/00-environment.tmux"
source-file -q "$HOME/.tmux/conf.d/10-plugins.tmux"
source-file -q "$HOME/.tmux/conf.d/20-hooks.tmux"
source-file -q "$HOME/.tmux/conf.d/30-keys.tmux"
source-file -q "$HOME/.tmux/conf.d/40-copy-mode.tmux"
source-file -q "$HOME/.tmux/conf.d/50-theme.tmux"

# Local overrides (not tracked in dotfiles)
source-file -q "$HOME/.tmux.conf.local"

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
